<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TrackYourGains</title>

    <!-- CSP: erlaubt DEV-API (localhost) + PROD-API (Railway) + Fonts + CloudFront -->
    <meta http-equiv="Content-Security-Policy"
          content="
          default-src 'self';
          connect-src
            'self'
            https://trackyourgains-production.up.railway.app
            http://localhost:5054
            http://localhost:5173
            ws://localhost:5173;
          script-src 'self';
          style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com;
          font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com;
          img-src 'self' data: https://*.cloudfront.net;
          frame-src 'self' https://www.youtube.com https://www.youtube-nocookie.com;
          frame-ancestors 'self';
          base-uri 'self';
          form-action 'self';
        ">

    <!-- Fonts -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" />

    <!-- Theme Init -->
    <script src="/theme-init.js"></script>

</head>
<body>
    <div id="app"></div>
    <!-- 👇 Für DEV immer die Source laden -->
    <script type="module" src="/src/main.ts"></script>
</body>
</html>
